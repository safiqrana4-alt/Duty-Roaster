<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duty Roster 2026</title>
  <meta name="description" content="Bangladesh Duty Roster 2026">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container py-3">
  <header class="app-header">
    <h1>📅 Duty Roster 2026</h1>
    <p>ডিউটি ম্যানেজমেন্ট সিস্টেম</p>
  </header>

  <div class="top-tabs">
    <button class="tab-btn active" id="dutyTabBtn" onclick="showDutyTab()">ডিউটি পেজ</button>
    <button class="tab-btn" id="moneyTabBtn" onclick="showMoneyTab()">টাকার হিসাব</button>
  </div>

  <section id="dutyPage">
    <div class="d-flex justify-content-center gap-2 mb-3 flex-wrap">
      <button class="btn btn-outline-primary" onclick="resetAllSwaps()">সব Swap Reset</button>
      <button class="btn btn-outline-secondary" onclick="downloadDutyJSON()">Download Duty JSON</button>
    </div>

    <section class="table-box">
      <table class="table align-middle mb-0" id="dutyTable">
        <thead>
          <tr>
            <th>তারিখ</th>
            <th>বার</th>
            <th>ডিউটি</th>
            <th>Swap</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>
  </section>

  <section id="moneyPage" class="d-none">
    <div class="row g-3">
      <div class="col-lg-6">
        <div class="card app-card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>জমা (Receive Money)</h5>
          </div>
          <div class="card-body">
            <form id="depositForm" onsubmit="event.preventDefault(); saveDeposit();">
              <div class="mb-3">
                <label class="form-label">জমা পেল</label>
                <select id="depositMember" class="form-select" required></select>
              </div>
              <div class="mb-3">
                <label class="form-label">পরিমাণ</label>
                <input type="number" id="depositAmount" class="form-control" min="1" placeholder="৳ টাকার পরিমাণ লিখুন" required>
              </div>
              <div class="d-flex gap-2 flex-wrap">
                <button class="btn btn-primary" type="submit">Save</button>
                <button class="btn btn-outline-secondary" type="button" onclick="resetDepositForm()">Reset</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card app-card">
          <div class="card-header">
            <h5 class="mb-0"><i class="bi bi-arrow-left-right me-2"></i>বকেয়া পরিশোধ</h5>
          </div>
          <div class="card-body">
            <form id="settlementForm" onsubmit="event.preventDefault(); saveSettlement();">
              <div class="row g-2">
                <div class="col-md-4">
                  <label class="form-label">দিলাম</label>
                  <select id="settlementFrom" class="form-select" required></select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">পেলাম</label>
                  <select id="settlementTo" class="form-select" required></select>
                </div>
                <div class="col-md-4">
                  <label class="form-label">Amount</label>
                  <input type="number" id="settlementAmount" class="form-control" min="1" placeholder="৳ পরিমাণ" required>
                </div>
              </div>
              <div class="d-flex gap-2 flex-wrap mt-3">
                <button class="btn btn-success" type="submit">Save</button>
                <button class="btn btn-outline-secondary" type="button" onclick="resetSettlementForm()">Reset</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <div class="col-lg-12">
        <div class="card app-card">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h5 class="mb-0"><i class="bi bi-diagram-3 me-2"></i>বকেয়া পরিশোধের হিসাব</h5>
            <span class="text-muted small" id="calcHint"></span>
          </div>
          <div class="card-body table-responsive">
            <table class="table table-bordered mb-0">
              <thead>
                <tr>
                  <th>দিবে</th>
                  <th>পাবে</th>
                  <th>Amount</th>
                </tr>
              </thead>
              <tbody id="settlementCalcBody"></tbody>
            </table>
            <div id="noRemainingBox" class="alert alert-info d-none mt-3 mb-0">No Remaining Settlement</div>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card app-card">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
            <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Transaction History</h5>
            <input type="text" id="historySearch" class="form-control form-control-sm w-auto" placeholder="Search history..." oninput="renderAll()">
          </div>
          <div class="card-body table-responsive">
            <table class="table table-striped mb-0">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Type</th>
                  <th>নাম</th>
                  <th>পেল/দিল</th>
                  <th>Amount</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
