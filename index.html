<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duty Roster 2026</title>
  <meta name="description" content="Bangladesh Duty Roster 2026">
  <meta name="theme-color" content="#2563eb">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container py-3">
  <header class="app-header sticky-top">
    <div class="d-flex align-items-center justify-content-center gap-2 flex-wrap">
      <img src="https://raw.githubusercontent.com/safiqrana4-alt/Duty-Roaster/main/chittagong-port-authority-logo-png_seeklogo-369103.png" alt="Chittagong Port Authority" class="app-logo">
      <div>
        <h1 class="mb-0">Duty Roster 2026</h1>
        <p class="mb-0">ডিউটি ম্যানেজমেন্ট সিস্টেম</p>
      </div>
    </div>
  </header>

  <div class="top-tabs">
    <button class="tab-btn active" id="tabToggleBtn" onclick="toggleTab()">ডিউটি</button>
  </div>

  <div class="page-shell">
    <section id="dutyPage" class="page-panel page-active">
      <section class="table-box mb-3">
        <table class="table align-middle mb-0" id="dutyTable">
          <thead>
            <tr>
              <th>তারিখ</th>
              <th>বার</th>
              <th>ডিউটি</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>

      <div id="leaveFeatures" class="d-none">
        <section class="accordion mb-3" id="leaveAccordion">
          <div class="accordion-item app-card">
            <h2 class="accordion-header" id="leaveFormHeading">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#leaveFormCollapse" aria-expanded="false" aria-controls="leaveFormCollapse">
                Leave System
              </button>
            </h2>
            <div id="leaveFormCollapse" class="accordion-collapse collapse" aria-labelledby="leaveFormHeading" data-bs-parent="#leaveAccordion">
              <div class="accordion-body">
                <form id="leaveForm" onsubmit="event.preventDefault(); saveLeave();">
                  <div class="row g-2">
                    <div class="col-md-4">
                      <label class="form-label">নাম</label>
                      <select id="leaveMember" class="form-select" required></select>
                    </div>
                    <div class="col-md-4">
                      <label class="form-label">শুরু তারিখ</label>
                      <input type="date" id="leaveStart" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                      <label class="form-label">শেষ তারিখ</label>
                      <input type="date" id="leaveEnd" class="form-control" required>
                    </div>
                  </div>
                  <div class="d-flex gap-2 flex-wrap mt-3">
                    <button class="btn btn-danger" type="submit">Add Leave</button>
                    <button class="btn btn-outline-secondary" type="button" onclick="resetLeaveForm()">Reset</button>
                  </div>
                </form>
              </div>
            </div>
          </div>

          <div class="accordion-item app-card mt-3">
            <h2 class="accordion-header" id="leaveListHeading">
              <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#leaveListCollapse" aria-expanded="false" aria-controls="leaveListCollapse">
                Leave List
              </button>
            </h2>
            <div id="leaveListCollapse" class="accordion-collapse collapse" aria-labelledby="leaveListHeading" data-bs-parent="#leaveAccordion">
              <div class="accordion-body table-responsive">
                <table class="table table-striped mb-0">
                  <thead>
                    <tr>
                      <th>নাম</th>
                      <th>শুরু</th>
                      <th>শেষ</th>
                      <th id="leaveActionTh" class="d-none">Action</th>
                    </tr>
                  </thead>
                  <tbody id="leaveBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </section>

        <div class="alert alert-secondary py-2 mb-3" id="swapStatusBox">
          Swap status loading...
        </div>
      </div>
    </section>

    <section id="moneyPage" class="page-panel d-none">
      <div class="row g-3">
        <div class="col-lg-6">
          <div class="card app-card">
            <div class="card-header d-flex justify-content-between align-items-center">
              <h5 class="mb-0"><i class="bi bi-plus-circle me-2"></i>জমা (Receive Money)</h5>
            </div>
            <div class="card-body">
              <form id="depositForm" onsubmit="event.preventDefault(); saveDeposit();">
                <div class="mb-3">
                  <label class="form-label">জমা পেল</label>
                  <select id="depositMember" class="form-select" required></select>
                </div>
                <div class="mb-3">
                  <label class="form-label">পরিমাণ</label>
                  <input type="number" id="depositAmount" class="form-control" min="1" placeholder="৳ টাকার পরিমাণ লিখুন" required>
                </div>
                <div class="d-flex gap-2 flex-wrap">
                  <button class="btn btn-primary" type="submit">Save</button>
                  <button class="btn btn-outline-secondary" type="button" onclick="resetDepositForm()">Reset</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <div class="col-lg-12">
          <div class="accordion mb-3" id="moneyAccordion">
            <div class="accordion-item app-card">
              <h2 class="accordion-header" id="settlementHeading">
                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#settlementCollapse" aria-expanded="false" aria-controls="settlementCollapse">
                  বকেয়া পরিশোধ
                </button>
              </h2>
              <div id="settlementCollapse" class="accordion-collapse collapse" aria-labelledby="settlementHeading" data-bs-parent="#moneyAccordion">
                <div class="accordion-body">
                  <div class="card-body">
                    <form id="settlementForm" onsubmit="event.preventDefault(); saveSettlement();">
                      <div class="row g-2">
                        <div class="col-md-4">
                          <label class="form-label">দিলাম</label>
                          <select id="settlementFrom" class="form-select" required></select>
                        </div>
                        <div class="col-md-4">
                          <label class="form-label">পেলাম</label>
                          <select id="settlementTo" class="form-select" required></select>
                        </div>
                        <div class="col-md-4">
                          <label class="form-label">Amount</label>
                          <input type="number" id="settlementAmount" class="form-control" min="1" placeholder="৳ পরিমাণ" required>
                        </div>
                      </div>
                      <div class="d-flex gap-2 flex-wrap mt-3">
                        <button class="btn btn-success" type="submit">Save</button>
                        <button class="btn btn-outline-secondary" type="button" onclick="resetSettlementForm()">Reset</button>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-12">
          <div class="card app-card">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
              <h5 class="mb-0"><i class="bi bi-calculator me-2"></i>বকেয়া পরিশোধের হিসাব</h5>
            </div>
            <div class="card-body table-responsive">
              <table class="table table-bordered mb-0">
                <thead>
                  <tr>
                    <th>দিবে</th>
                    <th>পাবে</th>
                    <th>Amount</th>
                  </tr>
                </thead>
                <tbody id="settlementCalcBody"></tbody>
              </table>
              <div id="noRemainingBox" class="alert alert-info d-none mt-3 mb-0">No Remaining Settlement</div>
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="card app-card">
            <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
              <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Transaction History</h5>
              <input type="text" id="historySearch" class="form-control form-control-sm w-auto" placeholder="Search history..." oninput="renderAll()">
            </div>
            <div class="card-body table-responsive">
              <table class="table table-striped mb-0">
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>নাম</th>
                    <th>পেল/দিল</th>
                    <th>Amount</th>
                    <th id="historyActionTh" class="d-none">Action</th>
                  </tr>
                </thead>
                <tbody id="historyBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
